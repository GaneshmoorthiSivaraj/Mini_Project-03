<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>GAMOO Forget-Password</title>
    </head>
    <body>
        <style>
            *{
                background-color: lightslategrey;
            }
            h2{
                margin-top: 200px;
                text-align: center;
                color: gold;
                font-weight:bolder;
                font-style: italic;
            }
            form{
                text-align: center;
            }
            .group{
                display: block;
                text-align: center;
                margin-bottom: 20px;
            }
            .box{
                justify-content: center;
                align-items: center;
                border-radius: 5px;
                margin-bottom: 20px;
                margin-left: 40px;
                background-color: beige;
                color: brown;
                padding: 3px;
            }
            button{
                border-radius: 5px;
                padding: 5px;
                padding-right: 15px;
                padding-left: 15px;
                background-color: dimgrey;
                color: darkred;
                font-weight: bolder;
                margin-top: 30px;
            }
        </style>
        <h2>Forget Password</h2>
        <form action="signin.html">
            <label class="group" style="margin-left: -20px;">Username</label>
            <input type="text" placeholder="Username" class="box" required>
            <label class="group" style="margin-left: 5px;">Email/Phone.No</label>
            <input type="text" placeholder="Email/Phone.no" class="box" required>
            <label class="group" >New Password</label>
            <input type="password" placeholder="Enter New Password" class="box" required>
            <label class="group" style="margin-left: 20px ;">Confirm Password</label>
            <input type="password" placeholder="Confirm Password" class="box" required><br>
            <a href="signin.html"><button>Submit</button></a>
        </form>
    </body>
</html>
