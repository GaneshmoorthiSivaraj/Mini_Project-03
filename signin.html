<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>GAMOO sign-in</title>

    </head>
    <body>
        <style>
            *{
                background-color: darkgray;
                color: darkslategray;
            }
            header{
                text-align: center;
                justify-content: center;
                font-size: 50px;
            }
            form{
                text-align: center;
            }
            input{
                justify-content: center;
                align-items: center;
                border-radius: 5px;
                margin-bottom: 10px;
                margin-left: 40px;
                background-color: beige;
                color: brown;
                padding: 3px;
                font-size: 15px;

            }
            label{
                display: block;
                text-align: center;
                margin-bottom: 5px;
                font-size: 30px;
                color:darkolivegreen
            }
            a{
                text-decoration: none;
            }

            #ee{
                font-weight: bold;
                font-style: italic;
                background-color: blanchedalmond;
                border-radius: 10px;
                border: 2px solid;
                padding-left: 5px;
                margin-top: 30px;
                padding-right: 5px;
            }
            #ff{
                font-size: 20px;
                padding-left: 20px;
                padding-right: 20px;
                padding-bottom: 5px;
                padding-top: 5px;
                border-radius: 20px;
                background-color: darkslategray;
                color: beige;
            }
        </style>
        <Header>
            <div>
                <h1>GAMOO</h1>
                <h3 style="color: maroon;">Sign In </h3>
            </div>
        </Header>
        <section>
            <div>
                <form action="login.html">
                        <label id="aa">Username</label><br>
                        <input id="bb" type="text" placeholder="Enter Your Username" required>
                        <br><br>
                        <label id="cc">Password</label><br>
                        <input id="dd" type="password" placeholder="Enter Your Password" required>
                        <br>
                        <a href="fg.html" id="ee">Forget Password</a><br><br>
                        <a href="login.html"><button id="ff">Login</button></a><br>
                   
                </form>
            </div>
        </section>
        
    </body>
</html>
