<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>GAMOO Sign-up</title>
    </head>
    <body>
        <Style>
            *{
                background-color:darkgrey;
            }
            h2,form{
                display:block;
                text-align: center;
            }
            h2{
                font-size: 60px;
                color: firebrick;
            }
            label{
                 font-size: 20px;
                 font-style:italic;
                 font-weight: bold;
                 color:darkblue;
            }
            input{
                margin-top: 10px;
                margin-bottom: 10px;
                border-radius: 5px;
                border: 1px solid;
                border-color:limegreen ;
                background-color: beige;
                color: darkred;
            }
            button{
                padding-left: 10px;
                padding-right: 10px;
                padding-top: 5px;
                padding-bottom: 5px;
                border-radius: 10px;
                background-color:teal;
                color:bisque;
            }
        </Style>
        <h2>Sign Up</h2>
        <form action="index.html">
            <label>First_Name</label><br>
            <input type="text" placeholder="" required><br>
            <label>Last_Name</label><br>
            <input type="text"  placeholder="" required><br>
            <label>User_Name</label><br>
            <input type="text" placeholder="" required><br>
            <label>Phone_Number</label><br>
            <input type="number" placeholder="" required><br>
            <label>Email_ID</label><br>
            <input type="email" placeholder="" required><br>
            <label>Password</label><br>
            <input type="password" placeholder="" required><br><br>
            <a href="index.html">
                <button>SUBMIT</button>
            </a>
        </form>
    </body>
</html>
